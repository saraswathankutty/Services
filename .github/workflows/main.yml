name: CI/CD Pipeline

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  # Build & Test
  api-build-test:
    name: API Build & Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Source
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Restore Packages
        run: dotnet restore

      - name: Build
        run: dotnet build src/CareFlow.HMS.API/CareFlow.HMS.API.csproj --configuration Release --no-restore

      - name: Run Tests
        run: dotnet test --configuration Release --no-build

      - name: Publish API
        run: dotnet publish src/CareFlow.HMS.API/CareFlow.HMS.API.csproj -c Release -o ./publish /p:UseAppHost=false

  # Docker Build Validation
  docker-build:
    name: Docker Build Validation
    runs-on: ubuntu-latest
    needs: api-build-test

    steps:
      - name: Checkout Source
        uses: actions/checkout@v4

      - name: Build Docker Image
        run: docker build -t hms-api:test .

  # Deploy to Render
  deploy-production:
    name: Deploy to Render
    runs-on: ubuntu-latest
    needs: docker-build

    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    environment:
      name: production
      url: https://hms-api.onrender.com

    steps:
      - name: Trigger Render Deploy
        env:
          RENDER_API_DEPLOY_HOOK: ${{ secrets.RENDER_API_DEPLOY_HOOK }}
        run: |
          echo "Triggering Render deployment..."
          curl -s -f -X POST "$RENDER_API_DEPLOY_HOOK"
          echo "Deployment triggered successfully."

      - name: Deployment Summary
        run: |
          echo "✅ ASP.NET Core 8 API deployed successfully."
