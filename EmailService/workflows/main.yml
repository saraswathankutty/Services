name: CI/CD Pipeline

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  # Build
  api-build:
    name: API Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Source
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Restore Packages
        run: dotnet restore EmailService.csproj

      - name: Build
        run: dotnet build EmailService.csproj --configuration Release --no-restore

      - name: Publish API
        run: dotnet publish EmailService.csproj -c Release -o ./publish /p:UseAppHost=false

  # Docker Build Validation
  docker-build:
    name: Docker Build Validation
    runs-on: ubuntu-latest
    needs: api-build

    steps:
      - name: Checkout Source
        uses: actions/checkout@v4

      - name: Build Docker Image
        run: docker build -t email-service:test .

  # Deploy Placeholder
  deploy-production:
    name: Deploy
    runs-on: ubuntu-latest
    needs: docker-build
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - name: Deployment Summary
        run: |
          echo "✅ ASP.NET Core 8 API built and Docker image validated successfully."
          # If you want to deploy to Render, you can uncomment and configure the curl request below:
          # curl -s -f -X POST "${{ secrets.RENDER_API_DEPLOY_HOOK }}"
